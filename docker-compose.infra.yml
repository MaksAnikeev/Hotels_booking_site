services:
  pgdb:
    image: postgres:15
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
    container_name: booking_db
    ports:
      - ${DB_PORT}:5432
    networks:
      - bookingNetwork
    restart: unless-stopped
    volumes:
      - pg-booking-data:/var/lib/postgresql/data
#      - ./backups:/docker-entrypoint-initdb.d #раскомить, если хочешь залить существующую БД,
      # но это надо делать при первом запуске или удали volumes: backend_course_pg-booking-data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: booking_redis
    ports:
      - "7379:6379"
    networks:
      - bookingNetwork
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    networks:
      - bookingNetwork
    volumes:
      - ./hosts/back_nginx.conf:/etc/nginx/conf.d/default.conf
    container_name: booking_nginx
    restart: unless-stopped

networks:
  bookingNetwork:
    external: True

volumes:
  pg-booking-data:
