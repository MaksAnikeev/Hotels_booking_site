services:
  pgdb:
    image: postgres:15
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
    container_name: booking_db
    ports:
      - ${DB_PORT}:5432
    networks:
      - bookingNetwork
    restart: unless-stopped
    volumes:
      - pg-booking-data:/var/lib/postgresql/data
#      - ./backups:/docker-entrypoint-initdb.d #раскомить, если хочешь залить существующую БД,
      # но это надо делать при первом запуске или удали volumes: backend_course_pg-booking-data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: booking_redis
    ports:
      - "7379:6379"
    networks:
      - bookingNetwork
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  migrations:
    build: .
    command: >
      sh -c "
        echo '🔄 Запуск миграций...' &&
        sleep 10 &&
        alembic upgrade head &&
        echo '✅ Миграции применены'
      "
    env_file:
      - .env
    depends_on:
      pgdb:
        condition: service_healthy
    restart: "no"
    networks:
      - bookingNetwork

  booking_back_service:
    container_name: "booking_back"
    build:
      context: .
    ports:
      - "7777:8000"
    networks:
      - bookingNetwork
    env_file:
      - .env
    depends_on:
      pgdb:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  celery_worker_service:
    container_name: "booking_celery_worker"
    build:
      context: .
    networks:
      - bookingNetwork
    command: "celery --app=src.tasks.celery_app:celery_instance worker -l INFO"
    env_file:
      - .env
    depends_on:
      pgdb:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  celery_beat_service:
    container_name: "booking_celery_beat"
    build:
      context: .
    networks:
      - bookingNetwork
    command: "celery --app=src.tasks.celery_app:celery_instance beat -l INFO"
    env_file:
      - .env
    depends_on:
      pgdb:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

networks:
  bookingNetwork:
    external: True

volumes:
  pg-booking-data: